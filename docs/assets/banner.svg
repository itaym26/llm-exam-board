<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#152238"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="600" cy="150" r="260" fill="url(#glow)"/>

  <!-- subtle grid texture -->
  <g stroke="#334155" stroke-width="1" opacity="0.25">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="url(#gold)" letter-spacing="1">
    llm-exam-board
  </text>
  <text x="600" y="158" text-anchor="middle" font-family="Trebuchet MS, Verdana, sans-serif" font-size="19" fill="#94a3b8" letter-spacing="2">
    A TEACHER · STUDENT · JUDGE PIPELINE THAT DISTRUSTS ITS OWN JUDGE
  </text>

  <!-- Pipeline row -->
  <g font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" fill="#e2e8f0">

    <!-- Teacher: graduation cap -->
    <g transform="translate(150,210)">
      <polygon points="0,-18 42,0 0,18 -42,0" fill="#2dd4bf"/>
      <rect x="-14" y="0" width="28" height="16" rx="2" fill="#0f766e"/>
      <line x1="30" y1="-6" x2="30" y2="22" stroke="#2dd4bf" stroke-width="2"/>
      <circle cx="30" cy="24" r="3" fill="#2dd4bf"/>
      <text x="0" y="52" text-anchor="middle">Teacher</text>
    </g>

    <path d="M 230 210 L 330 210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Audit Gate: door/gate -->
    <g transform="translate(390,205)">
      <rect x="-16" y="-22" width="32" height="44" rx="3" fill="none" stroke="#fbbf24" stroke-width="3"/>
      <line x1="0" y1="-22" x2="0" y2="22" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="6" cy="0" r="2.4" fill="#fbbf24"/>
      <text x="0" y="52" text-anchor="middle" font-size="13" fill="#cbd5e1">Audit Gate</text>
    </g>

    <path d="M 460 210 L 560 210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Student: person -->
    <g transform="translate(620,205)">
      <circle cx="0" cy="-14" r="12" fill="#60a5fa"/>
      <path d="M -20,26 C -20,4 20,4 20,26 Z" fill="#60a5fa"/>
      <text x="0" y="52" text-anchor="middle">Student</text>
    </g>

    <path d="M 690 210 L 790 210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Judges: scales of justice -->
    <g transform="translate(870,200)">
      <line x1="0" y1="-24" x2="0" y2="20" stroke="#f472b6" stroke-width="3"/>
      <line x1="-32" y1="-14" x2="32" y2="-14" stroke="#f472b6" stroke-width="3"/>
      <path d="M -32,-14 L -44,10 L -20,10 Z" fill="none" stroke="#f472b6" stroke-width="2.5"/>
      <path d="M 32,-14 L 44,10 L 20,10 Z" fill="none" stroke="#f472b6" stroke-width="2.5"/>
      <rect x="-18" y="20" width="36" height="6" rx="2" fill="#f472b6"/>
      <text x="0" y="55" text-anchor="middle">Judges</text>
    </g>

    <path d="M 960 210 L 1060 210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Ensemble: converging dots -->
    <g transform="translate(1110,205)">
      <circle cx="-14" cy="-10" r="5" fill="#a78bfa"/>
      <circle cx="14" cy="-10" r="5" fill="#a78bfa"/>
      <circle cx="0" cy="14" r="7" fill="#a78bfa"/>
      <line x1="-14" y1="-10" x2="0" y2="14" stroke="#a78bfa" stroke-width="1.5"/>
      <line x1="14" y1="-10" x2="0" y2="14" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="0" y="52" text-anchor="middle">Ensemble</text>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
